name: Integration Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Checkout API repo
        uses: actions/checkout@v4
        with:
          repository: propeller-commerce/propeller-sdet-task-petar-cvetanoski
          path: api
          token: ${{ secrets.API_REPO_TOKEN }}
          ref: fix/intentional-bugs
      - name: Start API with Docker Compose
        working-directory: api
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          for i in {1..30}; do
            curl -sf -X POST http://localhost:3000/graphql \
              -H "Content-Type: application/json" \
              -H "x-tenant-id: tenant-a" \
              -d '{"query":"{ products { id } }"}' \
              && echo "API is ready!" && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "API never became ready"
          exit 1

      - name: Seed the database
        working-directory: api
        run: docker compose run --rm seed

      - name: Wait after seed
        run: sleep 5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Teardown
        if: always()
        working-directory: api
        run: docker compose down -v
